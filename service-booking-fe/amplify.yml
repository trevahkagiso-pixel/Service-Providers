version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd service-booking-fe
        - npm ci
    build:
      commands:
        - cd service-booking-fe
        - npm run build
  artifacts:
    baseDirectory: service-booking-fe/dist
    files:
      - '**/*'
  cache:
    paths:
      - service-booking-fe/node_modules/**/*